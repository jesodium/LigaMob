<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0b">
  <title>LigaMob — Panamanian Youth Football</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div id="app">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="brand" id="brand-link" role="button" tabindex="0">
        <div class="brand-mark">
          <svg viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="13" stroke="currentColor" stroke-width="1.6"/>
            <path d="M16 5.5 L19.8 11.6 L26.4 13.7 L21.8 18.7 L22.3 25.4 L16 22.7 L9.7 25.4 L10.2 18.7 L5.6 13.7 L12.2 11.6 Z" fill="currentColor" fill-opacity="0.18" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="brand-text">
          <div class="brand-name">LigaMob</div>
          <div class="brand-tag">Football Index</div>
        </div>
      </div>

      <button class="league-switch" id="league-btn" aria-label="Switch league">
        <img id="league-logo-topbar" class="league-switch-logo" src="" alt="" onerror="this.style.opacity='0'">
        <div class="league-switch-text">
          <div class="league-switch-label">Active league</div>
          <div class="league-switch-name" id="league-name-topbar">—</div>
        </div>
        <svg class="league-switch-chev" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6l4 4 4-4"/>
        </svg>
      </button>

      <nav class="nav">
        <div class="nav-section-label">Browse</div>
        <a class="nav-tab nav-item active" data-tab="home" href="#">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l7-6 7 6"/><path d="M5 8v9h10V8"/></svg>
          <span>Home</span>
        </a>
        <a class="nav-tab nav-item" data-tab="matches" href="#">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="14" height="13" rx="2"/><path d="M3 8h14M7 2v4M13 2v4"/></svg>
          <span>Matches</span>
        </a>
        <a class="nav-tab nav-item" data-tab="standings" href="#">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17V9M10 17V4M15 17v-6"/></svg>
          <span>Standings</span>
        </a>
        <a class="nav-tab nav-item" data-tab="teams" href="#">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2l7 4v8l-7 4-7-4V6l7-4z"/><path d="M10 2v16M3 6l7 4 7-4"/></svg>
          <span>Teams</span>
        </a>
        <a class="nav-tab nav-item" data-tab="players" href="#">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="7" r="3.2"/><path d="M3.5 17c0-3.2 3-5 6.5-5s6.5 1.8 6.5 5"/></svg>
          <span>Players</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="footer-meta">
          <span class="dot live"></span>
          <span>Live data · technology-10.com</span>
        </div>
        <div class="footer-credits">Designed 2026</div>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="main">
      <header id="topbar">
        <div class="topbar-left">
          <button class="icon-btn back-btn" id="back-btn" aria-label="Back" style="display:none">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4l-6 6 6 6"/></svg>
          </button>
          <div class="page-title" id="page-title">Home</div>
          <div class="page-sub" id="page-sub"></div>
        </div>
        <div class="topbar-right">
          <button class="league-pill" id="league-btn-mobile" aria-label="Switch league">
            <img id="league-logo-pill" src="" alt="" onerror="this.style.opacity='0'">
            <span id="league-name-pill">—</span>
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 6l4 4 4-4"/></svg>
          </button>
        </div>
      </header>

      <div id="view" class="view-container">
        <div id="view-home"      class="view active"></div>
        <div id="view-matches"   class="view"></div>
        <div id="view-standings" class="view"></div>
        <div id="view-teams"     class="view"></div>
        <div id="view-players"   class="view"></div>
      </div>
    </main>

  </div>

  <!-- Mobile bottom nav -->
  <nav id="mobile-nav">
    <a class="mnav-tab nav-tab active" data-tab="home" href="#">
      <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10l8-7 8 7"/><path d="M5 9v10h12V9"/></svg>
      <span>Home</span>
    </a>
    <a class="mnav-tab nav-tab" data-tab="matches" href="#">
      <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="16" height="14" rx="2"/><path d="M3 10h16M8 2v5M14 2v5"/></svg>
      <span>Matches</span>
    </a>
    <a class="mnav-tab nav-tab" data-tab="standings" href="#">
      <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 19V10M11 19V3M16 19v-7"/></svg>
      <span>Table</span>
    </a>
    <a class="mnav-tab nav-tab" data-tab="teams" href="#">
      <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2l8 4v9l-8 5-8-5V6l8-4z"/></svg>
      <span>Teams</span>
    </a>
    <a class="mnav-tab nav-tab" data-tab="players" href="#">
      <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="8" r="3.5"/><path d="M4 19c0-3.5 3.2-5.5 7-5.5s7 2 7 5.5"/></svg>
      <span>Players</span>
    </a>
  </nav>

  <!-- League Picker Overlay -->
  <div id="league-overlay" class="overlay" aria-hidden="true">
    <div class="overlay-scrim" id="league-scrim"></div>
    <div class="modal" id="league-sheet">
      <div class="modal-header">
        <div>
          <div class="modal-title">Select league</div>
          <div class="modal-sub">Switch the active competition</div>
        </div>
        <button class="icon-btn" id="league-close" aria-label="Close">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="15" y1="5" x2="5" y2="15"/><line x1="5" y1="5" x2="15" y2="15"/></svg>
        </button>
      </div>
      <div id="league-grid" class="league-grid">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- Match Detail Overlay -->
  <div id="game-overlay" class="overlay" aria-hidden="true">
    <div class="overlay-scrim" id="game-scrim"></div>
    <div class="modal modal-tall" id="game-sheet">
      <button class="modal-close icon-btn" id="game-close-pill" aria-label="Close">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="15" y1="5" x2="5" y2="15"/><line x1="5" y1="5" x2="15" y2="15"/></svg>
      </button>
      <div id="game-detail-content"></div>
    </div>
  </div>

  <!-- Player Detail Overlay -->
  <div id="player-overlay" class="overlay" aria-hidden="true">
    <div class="overlay-scrim" id="player-scrim"></div>
    <div class="modal modal-tall" id="player-sheet">
      <button class="modal-close icon-btn" id="player-close-pill" aria-label="Close">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="15" y1="5" x2="5" y2="15"/><line x1="5" y1="5" x2="15" y2="15"/></svg>
      </button>
      <div id="player-detail-content"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
