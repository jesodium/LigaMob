<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0b">
  <title>LigaMob — Panamanian Football</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div id="app">

    <!-- Main Content -->
    <main id="main">
      <header id="topbar">
        <div class="topbar-left">
          <div class="page-title" id="page-title">LigaMob</div>
          <div class="page-sub" id="page-sub"></div>
        </div>
        <div class="topbar-right">
          <div class="league-dropdown" id="league-dropdown">
            <button class="league-dropdown-trigger" id="league-btn-pill" aria-label="Switch league">
              <img id="league-logo-pill" src="" alt="" onerror="this.style.opacity='0'">
              <span id="league-name-pill">—</span>
              <svg class="dropdown-chev" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 6l4 4 4-4"/></svg>
            </button>
            <div class="league-dropdown-menu" id="league-dropdown-menu">
              <div class="league-dropdown-list" id="league-grid"></div>
            </div>
          </div>
        </div>
      </header>

      <div id="view" class="view-container">
        <div id="view-home"      class="view active"></div>
        <div id="view-matches"   class="view"></div>
        <div id="view-standings" class="view"></div>
        <div id="view-teams"     class="view"></div>
        <div id="view-players"   class="view"></div>
      </div>
    </main>

  </div>

  <!-- Bottom Navigation -->
  <nav id="mobile-nav">
    <a class="mnav-tab nav-tab active" data-tab="home" href="#">
      <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10l8-7 8 7"/><path d="M5 9v10h12V9"/></svg>
      <span>Home</span>
    </a>
    <a class="mnav-tab nav-tab" data-tab="matches" href="#">
      <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="16" height="14" rx="2"/><path d="M3 10h16M8 2v5M14 2v5"/></svg>
      <span>Matches</span>
    </a>
    <a class="mnav-tab nav-tab" data-tab="standings" href="#">
      <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 19V10M11 19V3M16 19v-7"/></svg>
      <span>Table</span>
    </a>
    <a class="mnav-tab nav-tab" data-tab="teams" href="#">
      <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2l8 4v9l-8 5-8-5V6l8-4z"/></svg>
      <span>Teams</span>
    </a>
    <a class="mnav-tab nav-tab" data-tab="players" href="#">
      <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="8" r="3.5"/><path d="M4 19c0-3.5 3.2-5.5 7-5.5s7 2 7 5.5"/></svg>
      <span>Players</span>
    </a>
  </nav>

  <!-- League Picker Overlay -->
  <div id="league-overlay" class="overlay" aria-hidden="true">
    <div class="overlay-scrim" id="league-scrim"></div>
    <div class="modal" id="league-sheet">
      <div class="modal-header">
        <div>
          <div class="modal-title">Select league</div>
          <div class="modal-sub">Switch the active competition</div>
        </div>
        <button class="icon-btn" id="league-close" aria-label="Close">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="15" y1="5" x2="5" y2="15"/><line x1="5" y1="5" x2="15" y2="15"/></svg>
        </button>
      </div>
      <div id="league-grid" class="league-grid">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- Match Detail Overlay -->
  <div id="game-overlay" class="overlay" aria-hidden="true">
    <div class="overlay-scrim" id="game-scrim"></div>
    <div class="modal modal-tall" id="game-sheet">
      <button class="modal-close icon-btn" id="game-close-pill" aria-label="Close">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="15" y1="5" x2="5" y2="15"/><line x1="5" y1="5" x2="15" y2="15"/></svg>
      </button>
      <div id="game-detail-content"></div>
    </div>
  </div>

  <!-- Player Detail Overlay -->
  <div id="player-overlay" class="overlay" aria-hidden="true">
    <div class="overlay-scrim" id="player-scrim"></div>
    <div class="modal modal-tall" id="player-sheet">
      <button class="modal-close icon-btn" id="player-close-pill" aria-label="Close">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="15" y1="5" x2="5" y2="15"/><line x1="5" y1="5" x2="15" y2="15"/></svg>
      </button>
      <div id="player-detail-content"></div>
    </div>
  </div>

  <!-- Team Detail Overlay -->
  <div id="team-overlay" class="overlay" aria-hidden="true">
    <div class="overlay-scrim" id="team-scrim"></div>
    <div class="modal modal-tall" id="team-sheet">
      <button class="modal-close icon-btn" id="team-close-pill" aria-label="Close">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="15" y1="5" x2="5" y2="15"/><line x1="5" y1="5" x2="15" y2="15"/></svg>
      </button>
      <div id="team-detail-content"></div>
    </div>
  </div>

  <!-- News Detail Overlay -->
  <div id="news-overlay" class="overlay" aria-hidden="true">
    <div class="overlay-scrim" id="news-scrim"></div>
    <div class="modal modal-tall" id="news-sheet">
      <button class="modal-close icon-btn" id="news-close-pill" aria-label="Close">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="15" y1="5" x2="5" y2="15"/><line x1="5" y1="5" x2="15" y2="15"/></svg>
      </button>
      <div id="news-detail-content"></div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
