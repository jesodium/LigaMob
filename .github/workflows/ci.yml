name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node scripts/test_app.cjs
      - name: Start server for puppeteer tests
        run: |
          node server.js &
          sleep 2
          node scripts/test_puppeteer.cjs
        env:
          CI: true
